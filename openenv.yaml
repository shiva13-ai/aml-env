name: aml-env
version: "0.1.0"
description: >
  AML Compliance Officer environment. An AI agent reviews flagged bank transactions
  one-by-one, deciding to block, investigate, or clear each one.
  Real-world anti-money laundering triage with 3 tasks of increasing difficulty.
author: tupakula-siva-shankar
tags:
  - openenv
  - finance
  - compliance
  - aml
  - real-world
tasks:
  - name: triage_basic
    description: "5 transactions with clear single-signal AML indicators"
    difficulty: easy
  - name: triage_network
    description: "10 transactions forming a smurfing/layering/integration network"
    difficulty: medium
  - name: triage_adversarial
    description: "15 adversarially-crafted transactions including TBML, mirror trades, crypto mixers"
    difficulty: hard
action_space:
  type: discrete
  fields:
    - name: transaction_id
      type: string
    - name: decision
      type: enum
      values: [block, investigate, clear]
    - name: reasoning
      type: string
      optional: true
observation_space:
  fields:
    - name: transaction_id
      type: string
    - name: amount
      type: float
    - name: sender_country
      type: string
    - name: receiver_country
      type: string
    - name: transaction_type
      type: string
    - name: high_risk_country
      type: boolean
    - name: structuring_indicator
      type: boolean
    - name: pep_involved
      type: boolean
    - name: notes
      type: string
reward:
  range: [0.0, 1.0]
  description: >
    Normalized per-episode score. Partial credit: +3 correct block, +2 correct investigate,
    +1 correct clear, -2 false negative, -1 false positive. Reasoning bonus up to +0.2.
episode:
  max_steps: 20
  multi_turn: true